<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>계명 CMF 시냅스 명단 · C-NAPSE 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@400;500;600;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500;1,600&family=JetBrains+Mono:wght@400;500;600&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#0B1329;
    --bg-1:#0D1836;
    --ink:#EAF2FF;
    --cy-1:#A5C4F0;
    --cy-2:#7FB2E8;
    --cy-3:#C5D6F0;
    --glow:#87B0E8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#05080F;color:var(--ink);font-family:'Noto Sans KR',system-ui,sans-serif;}
  body{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 0 80px;}

  /* Toolbar */
  .toolbar{
    position:sticky;top:10px;z-index:1000;
    display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
    background:rgba(11,19,41,0.86);backdrop-filter:blur(10px);
    border:1px solid rgba(127,178,232,0.25);
    padding:10px 14px;border-radius:10px;margin-bottom:20px;
    font-family:'JetBrains Mono',monospace;font-size:12px;
  }
  .toolbar button{
    background:transparent;border:1px solid rgba(127,178,232,0.4);
    color:var(--cy-1);padding:8px 14px;border-radius:6px;cursor:pointer;
    font-family:inherit;font-size:11px;letter-spacing:0.08em;
    transition:all .15s ease;
  }
  .toolbar button:hover{background:rgba(127,178,232,0.12);color:var(--ink);border-color:var(--cy-2);}
  .toolbar button:disabled{opacity:0.5;cursor:wait;}
  .toolbar .label{color:rgba(197,214,240,0.6);padding:8px 4px 8px 8px;letter-spacing:0.12em;}

  /* Poster stage (for screen scaling) */
  .stage{
    width:1240px;height:1754px;
    transform-origin: top center;
  }
  @media (max-width:1300px){
    .stage{ transform: scale(var(--fit, 0.7)); }
  }

  /* ===== Poster ===== */
  .poster{
    position:relative;
    width:1240px;height:1754px;
    background: radial-gradient(ellipse at 50% 0%, #0D1836 0%, #0B1329 55%, #080F22 100%);
    overflow:hidden;
    font-family:'Noto Sans KR',sans-serif;
    color:var(--ink);
  }
  /* faint noise / vignette */
  .poster::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background:
      radial-gradient(ellipse at 20% 15%, rgba(135,176,232,0.06), transparent 40%),
      radial-gradient(ellipse at 85% 80%, rgba(127,178,232,0.05), transparent 45%);
    z-index:1;
  }

  /* Constellation background */
  .constellation{position:absolute;inset:0;z-index:2;pointer-events:none;}

  /* L-Brackets */
  .lb{position:absolute;width:36px;height:36px;z-index:6;pointer-events:none;}
  .lb::before,.lb::after{content:"";position:absolute;background:var(--cy-2);opacity:0.7;}
  .lb::before{left:0;top:0;width:36px;height:1px;}
  .lb::after{left:0;top:0;width:1px;height:36px;}
  .lb.tl{top:32px;left:36px;}
  .lb.tr{top:32px;right:36px;transform:scaleX(-1);}
  .lb.bl{bottom:32px;left:36px;transform:scaleY(-1);}
  .lb.br{bottom:32px;right:36px;transform:scale(-1,-1);}

  /* HEADER */
  .hdr{position:relative;z-index:5;padding: 56px 72px 8px;}
  .hdr-top{display:flex;justify-content:space-between;align-items:baseline;
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.18em;
    color:var(--cy-2);opacity:0.85;}
  .hdr-title{
    margin-top:14px;
    font-family:'Noto Serif KR',serif;font-weight:700;
    font-size:72px;line-height:1.02;letter-spacing:-0.01em;
    color:var(--ink);
    text-shadow: 0 0 36px rgba(135,176,232,0.28), 0 0 2px rgba(234,242,255,0.4);
  }
  .hdr-title em.hdr-synapse{
    font-style:normal;font-weight:normal;
    position:relative;display:inline-block;
    padding:0 12px;vertical-align:baseline;
    line-height:1;
  }
  .hdr-synapse-text{
    position:relative;z-index:2;
    font-family:'Gowun Batang','Noto Serif KR',serif;
    font-weight:700;font-size:72px;letter-spacing:0.01em;
    color:var(--cy-1);
    text-shadow:
      0 0 64px rgba(135,176,232,0.78),
      0 0 36px rgba(127,178,232,0.62),
      0 0 16px rgba(165,196,240,0.58),
      0 0 6px rgba(234,242,255,0.72),
      0 0 2px rgba(234,242,255,0.9);
    background: linear-gradient(180deg, #FFFFFF 0%, #EAF2FF 35%, #A5C4F0 78%, #7FB2E8 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .hdr-sub{
    margin-top:8px;
    font-family:'Noto Serif KR',serif;font-weight:400;
    line-height:1.3;color:var(--cy-1);opacity:0.82;
    max-width:720px;
  }
  .hdr-sub .en{display:block;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--cy-2);opacity:0.78;letter-spacing:0.02em;}
  .hdr-meta{
    position:absolute;right:72px;top:108px;
    text-align:right;
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;
    color:var(--cy-2);opacity:0.7;line-height:1.8;
  }
  .divider{position:relative;z-index:5;height:1px;margin:4px 72px 0;
    background: linear-gradient(to right, transparent, rgba(127,178,232,0.45), transparent);}

  /* GRID */
  .grid{
    position:relative;z-index:5;
    margin: 10px 0 0;
    padding: 0;
    display:grid;grid-template-columns: 1fr 1fr;
    grid-auto-rows: 156px;
    gap: 4px 0;
    max-height: 1436px;
    overflow: hidden;
    justify-items: center;
  }
  .slot{
    position:relative;
    width: 540px;
    padding: 8px 10px 8px 14px;
    height: 156px;
    display:grid;
    grid-template-columns: 178px 110px 1fr;
    gap:0 6px;
    align-items:stretch;
  }
  .slot::before{
    content:"";position:absolute;left:0;top:8px;bottom:8px;width:1px;
    background:linear-gradient(to bottom, transparent, rgba(127,178,232,0.25), transparent);
  }
  .gnum{
    position:absolute;top:4px;left:14px;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.22em;
    color:var(--cy-2);opacity:0.85;
  }

  /* Senior area */
  .sr{
    grid-column:1;
    display:grid;grid-template-rows: 1fr auto;
    height:100%;
    padding-bottom:3px;
  }
  .sr-neuron-wrap{
    grid-row:1;
    align-self:center;justify-self:center;
    width:178px;height:90px;position:relative;overflow:hidden;z-index:1;
  }
  .sr-neuron-img{
    position:absolute;
    width:90px;height:178px;
    top:50%;left:50%;
    transform: translate(-50%, -50%) rotate(-90deg);
    object-fit:cover;
    mix-blend-mode:screen;opacity:0.94;
    filter:brightness(1.2) contrast(1.06);
    mask-image: radial-gradient(ellipse 72% 84% at 50% 50%, #000 22%, transparent 78%);
    -webkit-mask-image: radial-gradient(ellipse 72% 84% at 50% 50%, #000 22%, transparent 78%);
  }
  .sr-text{
    grid-row:2;
    display:flex;flex-direction:column;align-items:center;
    text-align:center;
  }
  .sr-name{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Sans KR',sans-serif;font-weight:600;font-size:20px;
    color:#FFFFFF;letter-spacing:0.005em;line-height:1.1;
    text-shadow:
      0 0 3px rgba(11,19,41,1),
      0 0 7px rgba(11,19,41,0.92),
      0 0 14px rgba(11,19,41,0.65),
      0 1px 2px rgba(0,0,0,0.9);
    z-index:3;pointer-events:none;text-align:center;padding:0 4px;
  }
  .sr-en{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;
    font-size:12px;color:var(--cy-1);opacity:0.68;margin-top:2px;
    line-height:1.14;max-width:186px;letter-spacing:0.01em;
  }

  /* Connector */
  .conn{grid-column:2;position:relative;align-self:stretch;z-index:3;}
  .conn svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;}

  /* Juniors area */
  .jr{
    grid-column:3;display:flex;flex-direction:column;justify-content:center;
    gap:9px;padding-right:4px;
  }
  .jr-row{
    display:flex;align-items:center;gap:12px;
  }
  .jr-neuron-wrap{
    width:76px;height:50px;position:relative;overflow:hidden;flex-shrink:0;z-index:1;
  }
  .jr-neuron-img{
    position:absolute;
    width:50px;height:76px;
    top:50%;left:50%;
    transform: translate(-50%, -50%) rotate(-90deg);
    object-fit:cover;
    mix-blend-mode:screen;opacity:0.9;
    filter:brightness(1.16);
    mask-image: radial-gradient(ellipse 70% 82% at 50% 50%, #000 20%, transparent 77%);
    -webkit-mask-image: radial-gradient(ellipse 70% 82% at 50% 50%, #000 20%, transparent 77%);
  }
  .jr-text{display:flex;flex-direction:column;line-height:1.1;min-width:0;}
  .jr-name{
    font-family:'Noto Sans KR',sans-serif;font-weight:600;font-size:17px;
    color:var(--ink);letter-spacing:-0.01em;
  }
  .jr-en{
    font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;
    font-size:12px;color:var(--cy-1);opacity:0.6;margin-top:1px;
    letter-spacing:0.01em;line-height:1.15;
  }
  /* 후배 1명인 슬롯 — 큰 뉴런 */
  .slot[data-jrc="1"] .jr-neuron-wrap{width:96px;height:64px;}
  .slot[data-jrc="1"] .jr-neuron-img{width:64px;height:96px;}
  .slot[data-jrc="1"] .jr-name{font-size:18px;}
  .slot[data-jrc="1"] .jr-en{font-size:13px;}
  /* 후배 3명인 슬롯 — 살짝 압축 */
  .slot[data-jrc="3"] .jr{gap:4px;}
  .slot[data-jrc="3"] .jr-neuron-wrap{width:65px;height:43px;}
  .slot[data-jrc="3"] .jr-neuron-img{width:43px;height:65px;}
  .slot[data-jrc="3"] .jr-name{font-size:16px;}
  .slot[data-jrc="3"] .jr-en{font-size:11px;}
  /* 후배 4명인 슬롯 — 공간 압축 */
  .slot[data-jrc="4"] .jr{gap:3px;}
  .slot[data-jrc="4"] .jr-neuron-wrap{width:48px;height:32px;}
  .slot[data-jrc="4"] .jr-neuron-img{width:32px;height:48px;}
  .slot[data-jrc="4"] .jr-name{font-size:14px;}
  .slot[data-jrc="4"] .jr-en{font-size:10px;}

  /* 왼쪽 열(홀수 슬롯) 시각 중심 보정 — 오른쪽으로 미세 이동 */
  .grid > .slot:nth-child(odd){ transform: translateX(30px); }

  /* Decorative slot in the G.17 empty slot — 장식 뉴런 */
  .mark-slot{
    position:relative;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:150px;gap:6px;
  }
  .mark-slot::before{
    content:"";position:absolute;left:0;top:8px;bottom:8px;width:1px;
    background:linear-gradient(to bottom, transparent, rgba(127,178,232,0.2), transparent);
  }
  .mark-neuron-wrap{
    width:156px;height:96px;position:relative;overflow:hidden;
  }
  .mark-neuron-img{
    position:absolute;
    width:120px;height:180px;
    top:50%;left:50%;
    transform: translate(-50%, -50%);
    object-fit:cover;
    mix-blend-mode:screen;opacity:0.42;
    filter:brightness(1.1) contrast(0.95);
    mask-image: radial-gradient(ellipse 58% 58% at 50% 50%, #000 20%, transparent 76%);
    -webkit-mask-image: radial-gradient(ellipse 58% 58% at 50% 50%, #000 20%, transparent 76%);
  }
  .mark-label{
    font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.32em;
    color:var(--cy-2);opacity:0.55;
  }
  .mark-label .star{color:var(--glow);margin:0 6px;filter:drop-shadow(0 0 4px #7FB2E8);}

  /* Footer */
  .footer{
    position:absolute;z-index:5;left:72px;right:72px;bottom:56px;
    display:flex;justify-content:space-between;align-items:flex-end;
    font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.2em;
    color:var(--cy-2);opacity:0.7;
  }
  .footer .left{line-height:1.8;}
  .footer .right{text-align:right;line-height:1.8;}
  .footer .star{color:var(--glow);}

  @media print{
    @page{size: A3 portrait; margin: 0;}
    body{background:#0B1329;padding:0;}
    .toolbar{display:none;}
    .stage{transform:none;width:297mm;height:420mm;}
    .poster{width:297mm;height:420mm;}
  }

  /* Headless render mode — activated via ?render=1 in URL (Chrome headless screenshot) */
  html.render-mode,
  html.render-mode body{background:#0B1329;padding:0;margin:0;overflow:hidden;}
  html.render-mode .toolbar{display:none !important;}
  html.render-mode .stage{transform:none !important;width:1240px !important;height:1754px !important;margin:0 !important;padding:0 !important;}
  html.render-mode .poster{width:1240px !important;height:1754px !important;}
  html.render-mode *,
  html.render-mode *::before,
  html.render-mode *::after{animation:none !important;transition:none !important;}
  html.render-mode .syn-shimmer,
  html.render-mode .syn-pulse,
  html.render-mode .syn-pulse-core{display:none !important;}
  html.render-mode #neural-bg{display:none !important;}

  /* Neural background (injected into .poster) */
  #neural-bg{
    position:absolute;inset:0;width:100%;height:100%;
    z-index:0;pointer-events:none;opacity:0.85;
  }

  /* ── Intermittent action-potential shimmer ── */
  @keyframes syn-shimmer-flow {
    0%   { stroke-dashoffset: 80; opacity: 0; }
    76%  { stroke-dashoffset: 80; opacity: 0; }
    78%  { stroke-dashoffset: 75; opacity: 0.9; }
    96%  { stroke-dashoffset: 5;  opacity: 0.9; }
    98%  { stroke-dashoffset: 0;  opacity: 0; }
    100% { stroke-dashoffset: 0;  opacity: 0; }
  }
  .syn-shimmer {
    animation: syn-shimmer-flow var(--syn-dur, 5s) linear infinite;
    animation-delay: var(--syn-delay, 0s);
  }
  /* Pulses are SMIL-driven (animateMotion + animate) — no CSS animation here.
     Intentionally no will-change: Android Chrome over-promotes SMIL-animated
     SVG children and causes flicker when the poster is zoomed/panned. */
  @media (prefers-reduced-motion: reduce) {
    /* Hide only the CSS shimmer; keep SMIL pulses visible — they ARE the
       constellation. The pulses are intermittent (~76% idle) so they already
       respect the spirit of reduced-motion without going totally static. */
    .syn-shimmer { animation: none !important; opacity: 0; }
  }
</style>
</head>
<body>

<div class="toolbar">
  <span class="label">DOWNLOAD</span>
  <button id="dl-prev">미리보기 · 1240×1754</button>
  <button id="dl-300">인쇄 A3 · 300 DPI · 3508×4961</button>
  <button id="dl-600">초고화질 A3 · 600 DPI · 7016×9921</button>
  <button id="dl-print">PRINT / PDF (Cmd+P)</button>
</div>

<div class="stage" id="stage">
<div class="poster" id="poster">

  <!-- Constellation background -->
  <svg class="constellation" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1240 1754" preserveAspectRatio="none">
    <defs>
      <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="2"/>
      </filter>
      <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="1.2"/>
      </filter>
      <filter id="hugeGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="4"/>
      </filter>
      <radialGradient id="bouton" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#EAF2FF" stop-opacity="0.9"/>
        <stop offset="40%" stop-color="#A5C4F0" stop-opacity="0.5"/>
        <stop offset="100%" stop-color="#7FB2E8" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="soma" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#A5C4F0" stop-opacity="0.32"/>
        <stop offset="55%" stop-color="#7FB2E8" stop-opacity="0.1"/>
        <stop offset="100%" stop-color="#0D1836" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="somaCore" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#EAF2FF" stop-opacity="0.5"/>
        <stop offset="60%" stop-color="#A5C4F0" stop-opacity="0.1"/>
        <stop offset="100%" stop-color="#7FB2E8" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <g stroke="#7FB2E8" fill="none" stroke-width="0.8" opacity="0.14" filter="url(#softGlow)">
      <path d="M 60,240 C 320,200 560,420 860,340 S 1180,480 1210,420"/>
      <path d="M 80,540 Q 380,640 680,590 T 1180,680"/>
      <path d="M 40,820 C 260,760 500,920 780,860 S 1080,940 1220,880"/>
      <path d="M 120,1100 Q 420,1180 720,1120 T 1180,1200"/>
      <path d="M 60,1360 C 320,1300 540,1460 820,1400 S 1080,1480 1200,1420"/>
    </g>
    <g stroke="#A5C4F0" fill="none" stroke-width="0.6" opacity="0.11" stroke-dasharray="2 4">
      <path d="M 200,180 C 360,340 640,280 820,420 S 1080,540 1180,620"/>
      <path d="M 60,480 Q 280,360 520,500 T 960,460 T 1200,540"/>
      <path d="M 40,780 C 220,900 460,780 660,900 S 960,1060 1180,980"/>
      <path d="M 120,1240 Q 340,1120 620,1260 T 1120,1220"/>
      <path d="M 80,1540 C 300,1460 540,1580 820,1500 S 1100,1620 1220,1540"/>
      <path d="M 240,120 C 300,260 180,420 300,520 S 420,720 380,880"/>
      <path d="M 880,160 C 960,320 860,480 980,600 S 1100,820 1020,980"/>
      <path d="M 540,80 C 600,240 460,400 580,540 S 700,760 620,920 S 540,1180 640,1340"/>
    </g>
    <!-- 신경회로 확장 — axon 가지 + 경로 -->
    <g stroke="#87B0E8" fill="none" stroke-width="0.5" opacity="0.1" stroke-linecap="round">
      <!-- 축삭 곁가지 (axon collaterals) -->
      <path d="M 180,380 Q 220,360 260,370 T 340,380 Q 380,390 420,385"/>
      <path d="M 820,280 Q 860,270 900,290 T 980,320 Q 1020,340 1060,335"/>
      <path d="M 140,960 Q 180,950 210,970 T 280,990 Q 320,1000 360,990"/>
      <path d="M 860,1060 Q 900,1070 940,1060 T 1020,1050 Q 1060,1040 1100,1050"/>
      <path d="M 300,1340 Q 340,1330 380,1350 T 460,1370"/>
      <path d="M 760,1500 Q 800,1490 840,1510 T 920,1520"/>
    </g>
    <!-- 수상돌기 갈래 (dendrite branching) -->
    <g stroke="#7FB2E8" fill="none" stroke-width="0.45" opacity="0.13" stroke-linecap="round">
      <!-- 좌상단 -->
      <path d="M 90,150 L 70,130 L 55,118 M 70,130 L 58,145 M 90,150 L 105,135 L 120,120 M 105,135 L 115,125 M 90,150 L 80,170"/>
      <!-- 우상단 -->
      <path d="M 1150,140 L 1170,122 L 1188,110 M 1170,122 L 1180,135 M 1150,140 L 1132,125 L 1115,115 M 1132,125 L 1122,138 M 1150,140 L 1160,160"/>
      <!-- 좌하단 -->
      <path d="M 100,1620 L 82,1605 L 68,1595 M 82,1605 L 72,1620 M 100,1620 L 118,1605 L 132,1598 M 118,1605 L 126,1618 M 100,1620 L 90,1640"/>
      <!-- 우하단 -->
      <path d="M 1140,1610 L 1160,1595 L 1175,1588 M 1160,1595 L 1172,1608 M 1140,1610 L 1122,1598 L 1108,1590 M 1122,1598 L 1112,1612 M 1140,1610 L 1150,1630"/>
      <!-- 중앙 옆면 -->
      <path d="M 30,700 L 15,682 M 30,700 L 48,685 M 30,700 L 22,720 M 30,700 L 42,718"/>
      <path d="M 1210,720 L 1225,700 M 1210,720 L 1192,706 M 1210,720 L 1218,740 M 1210,720 L 1196,738"/>
    </g>
    <!-- 추가 축삭 경로 — 파선 -->
    <g stroke="#C5D6F0" fill="none" stroke-width="0.4" opacity="0.08" stroke-dasharray="1 3">
      <path d="M 400,60 Q 500,180 620,160 T 840,200"/>
      <path d="M 620,1700 Q 720,1600 820,1620 T 1040,1580"/>
      <path d="M 200,300 Q 300,420 420,410 T 620,480 T 820,520"/>
    </g>
    <!-- 시냅스 bouton — 기존 곡선 위 점광원 -->
    <g>
      <circle cx="120" cy="120" r="3.5" fill="url(#bouton)" opacity="0.7"/>
      <circle cx="1118" cy="118" r="3.5" fill="url(#bouton)" opacity="0.7"/>

/* ============================ CONNECTOR SVG ============================ */
let _connUid = 0;
function connectorSVG(jrCount, slotIdx){
  const vbW = 110, vbH = 108;
  // 깊은 침투: 선배 뉴런 중앙부까지 / 후배 뉴런 내부로
  const axonX = -44;       // 선배 뉴런 속 ~33px 파고듦
  const dendX = vbW + 16;  // 후배 뉴런 속 ~16px 파고듦
  const startY = 39;
  _connUid++;
  const gid = `gb_${_connUid}`;
  const sid = `sg_${_connUid}`;
  const mid = `md_${_connUid}`;
  const hid = `hl_${_connUid}`;

  let ys = [];
  if (jrCount === 1) ys = [54];
  else if (jrCount === 2) ys = [31, 77];
  else if (jrCount === 3) ys = [15, 54, 93];
  else ys = [9, 37, 71, 99];

  const rand = (seed)=> ((Math.sin(seed * 12.9898) * 43758.5453) % 1 + 1) % 1;

  let paths = "", particles = "", glow = "", bouton = "", collaterals = "", arbor = "";

  ys.forEach((y, jrIdx)=>{
    const s = (slotIdx||0) * 7.31 + jrIdx * 3.17 + 1.9;
    const vx1 = rand(s);
    const vx2 = rand(s + 0.71);
    const vy1 = rand(s + 1.37);
    const vy2 = rand(s + 2.19);
    const vDash = rand(s + 3.05);
    const vCol = rand(s + 4.13);

    const dy = y - startY;
    const absdy = Math.abs(dy);
    const sign = Math.sign(dy) || (vy1 > 0.5 ? 1 : -1);

    let cp1y, cp2y;
    if (absdy < 5){
      const sDrift = (vy1 - 0.5) * 22;
      cp1y = startY + sDrift;
      cp2y = y - sDrift * 0.8;
    } else {
      const boostBase = Math.min(absdy * 0.8 + 10, 48);
      const boostVar = 0.8 + vy1 * 0.7;
      const boost1 = sign * boostBase * boostVar;
      const boost2 = sign * boostBase * (0.25 + vy2 * 0.35);
      cp1y = startY + boost1;
      cp2y = y + boost2;
    }
    const cp1x = 4 + vx1 * 24;         // -40에서 출발하므로 초기 cp 당김
    const cp2x = 80 + vx2 * 22;

    const P0 = [axonX, startY];
    const P1 = [cp1x, cp1y];
    const P2 = [cp2x, cp2y];
    const P3 = [dendX, y];

    const d = `M ${P0[0]},${P0[1]} C ${P1[0].toFixed(1)},${P1[1].toFixed(1)} ${P2[0].toFixed(1)},${P2[1].toFixed(1)} ${P3[0]},${P3[1].toFixed(1)}`;

    // 4중 글로우 (와이드 halo → 좁은 core)
    glow += `<path d="${d}" stroke="#7FB2E8" stroke-width="7" opacity="0.08" fill="none" filter="url(#${hid})" stroke-linecap="round"/>`;
    glow += `<path d="${d}" stroke="#A5C4F0" stroke-width="3.8" opacity="0.15" fill="none" filter="url(#${gid})" stroke-linecap="round"/>`;
    glow += `<path d="${d}" stroke="#C5D6F0" stroke-width="1.9" opacity="0.3" fill="none" filter="url(#${mid})" stroke-linecap="round"/>`;

    // 메인 라인 (dashed, 변주)
    const dashPatterns = ["3 5", "2 4", "4 6", "3 4", "5 3 2 3", "2 3 5 3"];
    const dashP = dashPatterns[Math.floor(vDash * dashPatterns.length)];
    paths += `<path d="${d}" stroke="#EAF2FF" stroke-width="1.15" stroke-dasharray="${dashP}" opacity="0.9" fill="none" stroke-linecap="round"/>`;

    // 간헐적 활동 전위 — 76% 휴지 → 22% 주행 → 2% 페이드
    // SMIL (animateMotion + animate) is isolated from parent CSS transforms,
    // so poster zoom/pan does not retrigger or stutter the traveling pulse.
    const apId     = `apPath_${_connUid}_${jrIdx}`;
    const cycleDur = (4.0 + rand(s + 8.3) * 3.0).toFixed(2);  // 4.0–7.0s
    const phase    = (-(rand(s + 9.7) * parseFloat(cycleDur))).toFixed(2);
    const AS = '0.76', AP = '0.770', AE = '0.98';
    paths += `<path id="${apId}" d="${d}" fill="none" stroke="none"/>`;
    paths += `<path class="syn-shimmer" d="${d}" stroke="#EAF2FF" stroke-width="0.9" stroke-dasharray="6 74" stroke-linecap="round" fill="none" opacity="0" filter="url(#${mid})" style="--syn-dur:${cycleDur}s; --syn-delay:${phase}s"/>`;
    particles += `<circle class="syn-pulse" r="2.2" fill="#EAF2FF" opacity="0" filter="url(#${mid})">
      <animateMotion dur="${cycleDur}s" repeatCount="indefinite" begin="${phase}s" keyPoints="0;0;1" keyTimes="0;${AS};1" rotate="auto"><mpath xlink:href="#${apId}" href="#${apId}"/></animateMotion>
      <animate attributeName="opacity" dur="${cycleDur}s" repeatCount="indefinite" begin="${phase}s" values="0;0;0.95;0.95;0" keyTimes="0;${AS};${AP};${AE};1"/>
    </circle>`;
    particles += `<circle class="syn-pulse-core" r="0.9" fill="#FFFFFF" opacity="0">
      <animateMotion dur="${cycleDur}s" repeatCount="indefinite" begin="${phase}s" keyPoints="0;0;1" keyTimes="0;${AS};1"><mpath xlink:href="#${apId}" href="#${apId}"/></animateMotion>
      <animate attributeName="opacity" dur="${cycleDur}s" repeatCount="indefinite" begin="${phase}s" values="0;0;1;1;0" keyTimes="0;${AS};${AP};${AE};1"/>
    </circle>`;

    // 베지어 위치/접선
    const bz = (t) => {
      const mt = 1 - t;
      return [
        mt*mt*mt*P0[0] + 3*mt*mt*t*P1[0] + 3*mt*t*t*P2[0] + t*t*t*P3[0],
        mt*mt*mt*P0[1] + 3*mt*mt*t*P1[1] + 3*mt*t*t*P2[1] + t*t*t*P3[1]
      ];
    };
    const bzTan = (t) => {
      const mt = 1 - t;
      return [
        3*mt*mt*(P1[0]-P0[0]) + 6*mt*t*(P2[0]-P1[0]) + 3*t*t*(P3[0]-P2[0]),
        3*mt*mt*(P1[1]-P0[1]) + 6*mt*t*(P2[1]-P1[1]) + 3*t*t*(P3[1]-P2[1])
      ];
    };

    // 부측지 (axon collaterals) — 2~3개, 수직 분기
    const collCount = 2 + (vCol > 0.5 ? 1 : 0);
    const collTs = collCount === 3 ? [0.28, 0.52, 0.76] : [0.34, 0.68];
    collTs.forEach((t, ci) => {
      const [bx, by] = bz(t);
      const [tx, ty] = bzTan(t);
      const len = Math.hypot(tx, ty) || 1;
      const nx = -ty/len, ny = tx/len;
      const sideSeed = rand(s + 5.1 + ci * 0.37);
      const side = sideSeed > 0.5 ? 1 : -1;
      const reach = 6 + rand(s + 6.1 + ci * 0.41) * 10;
      const curvy = rand(s + 7.1 + ci * 0.29) * 0.35 + 0.45;
      const endX = bx + nx * reach * side + (tx/len) * reach * 0.3;
      const endY = by + ny * reach * side + (ty/len) * reach * 0.3;
      const ctlX = bx + nx * reach * curvy * side + (tx/len) * reach * 0.12;
      const ctlY = by + ny * reach * curvy * side + (ty/len) * reach * 0.12;
      const cd = `M ${bx.toFixed(1)},${by.toFixed(1)} Q ${ctlX.toFixed(1)},${ctlY.toFixed(1)} ${endX.toFixed(1)},${endY.toFixed(1)}`;
      collaterals += `<path d="${cd}" stroke="#A5C4F0" stroke-width="1.7" opacity="0.16" fill="none" filter="url(#${mid})" stroke-linecap="round"/>`;
      collaterals += `<path d="${cd}" stroke="#C5D6F0" stroke-width="0.55" opacity="0.62" fill="none" stroke-linecap="round"/>`;
      collaterals += `<circle cx="${endX.toFixed(1)}" cy="${endY.toFixed(1)}" r="1.9" fill="#7FB2E8" opacity="0.22" filter="url(#${mid})"/>`;
      collaterals += `<circle cx="${endX.toFixed(1)}" cy="${endY.toFixed(1)}" r="0.85" fill="#EAF2FF" opacity="0.88"/>`;
    });

    // 경로 위 mini-bouton (varicosity)
    [0.16, 0.38, 0.6, 0.84].forEach((t, ti)=>{
      const [x_t, y_t] = bz(t);
      const r  = (ti === 1 || ti === 2) ? 1.35 : 0.9;
      const op = (ti === 1 || ti === 2) ? 0.95 : 0.72;
      if (ti === 1 || ti === 2){
        particles += `<circle cx="${x_t.toFixed(1)}" cy="${y_t.toFixed(1)}" r="2.6" fill="#7FB2E8" opacity="0.18" filter="url(#${gid})"/>`;
      }
      particles += `<circle cx="${x_t.toFixed(1)}" cy="${y_t.toFixed(1)}" r="${r}" fill="#C5D6F0" opacity="${op}"/>`;
    });

    // 축삭 시작부 bouton (선배 뉴런 속 깊이)
    bouton += `<circle cx="${(axonX + 8).toFixed(1)}" cy="${startY.toFixed(1)}" r="3.8" fill="#7FB2E8" opacity="0.28" filter="url(#${gid})"/>`;
    bouton += `<circle cx="${(axonX + 8).toFixed(1)}" cy="${startY.toFixed(1)}" r="1.9" fill="#A5C4F0" opacity="0.7"/>`;
    bouton += `<circle cx="${(axonX + 8).toFixed(1)}" cy="${startY.toFixed(1)}" r="0.9" fill="#EAF2FF" opacity="0.95"/>`;

    // 말단 수상돌기 arbor — 3 잎 splay
    [[-6.5, 0.9, -3], [0, 1.0, 0], [6.5, 0.9, 3]].forEach(([dyOff, strength, curveOff]) => {
      const tipX = dendX + 9;
      const tipY = y + dyOff;
      const ctl1X = dendX - 1 + curveOff * 0.3;
      const ctl1Y = y + dyOff * 0.4;
      const ad = `M ${dendX.toFixed(1)},${y.toFixed(1)} Q ${ctl1X.toFixed(1)},${ctl1Y.toFixed(1)} ${tipX.toFixed(1)},${tipY.toFixed(1)}`;
      arbor += `<path d="${ad}" stroke="#7FB2E8" stroke-width="${1.6 * strength}" opacity="0.15" fill="none" filter="url(#${mid})" stroke-linecap="round"/>`;
      arbor += `<path d="${ad}" stroke="#C5D6F0" stroke-width="${0.6 * strength}" opacity="${0.7 * strength}" fill="none" stroke-linecap="round"/>`;
      arbor += `<circle cx="${tipX.toFixed(1)}" cy="${tipY.toFixed(1)}" r="${0.8 * strength}" fill="#EAF2FF" opacity="${0.88 * strength}"/>`;
    });

    // 시냅스 주착지 (원래 landing)
    particles += `<circle cx="${(dendX - 2).toFixed(1)}" cy="${y.toFixed(1)}" r="3.4" fill="#EAF2FF" opacity="0.96" filter="url(#${sid})"/>`;
    particles += `<circle cx="${(dendX - 2).toFixed(1)}" cy="${y.toFixed(1)}" r="1.4" fill="#C5D6F0" opacity="1"/>`;
  });

  return `
    <svg viewBox="0 0 ${vbW} ${vbH}" preserveAspectRatio="none">
      <defs>
        <filter id="${hid}" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="3.6"/></filter>
        <filter id="${gid}" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.2"/></filter>
        <filter id="${mid}" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="1.1"/></filter>
        <filter id="${sid}" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="1.8"/></filter>
      </defs>
      ${glow}${collaterals}${paths}${arbor}${bouton}${particles}
    </svg>`;
}

function renderGrid(){
  const grid = document.getElementById('grid');
  let html = "";
  GROUPS.forEach((G, slotIdx)=>{
    html += `
    <div class="slot" data-jrc="${G.jr.length}">
      <span class="gnum">${G.g}</span>
      <div class="sr">
        <div class="sr-neuron-wrap">
          <img class="sr-neuron-img" loading="lazy" src="${url(G.sr.f)}" alt="">
          <div class="sr-name">${G.sr.n}</div>
        </div>
        <div class="sr-text">
          <div class="sr-en">${G.sr.en}</div>
        </div>
      </div>
      <div class="conn">${connectorSVG(G.jr.length, slotIdx)}</div>
      <div class="jr">
        ${G.jr.map(j=>`
          <div class="jr-row">
            <div class="jr-neuron-wrap"><img class="jr-neuron-img" loading="lazy" src="${url(j.f)}" alt=""></div>
            <div class="jr-text">
              <span class="jr-name">${j.n}</span>
              <span class="jr-en">${j.en}</span>
            </div>
          </div>`).join("")}
      </div>
    </div>`;
  });
  // 18th — 장식 뉴런 슬롯 (후각구 과립세포, 10번)
  html += `
    <div class="mark-slot">
      <div class="mark-neuron-wrap">
        <img class="mark-neuron-img" loading="lazy" src="${url("10_olfactory_granule.png")}" alt="">
      </div>
      <div class="mark-label">
        <span class="star">✦</span> C-NAPSE · 2026 <span class="star">✦</span>
      </div>
    </div>`;
  grid.innerHTML = html;
}

renderGrid();

/* Inject complex neural background into .poster (behind constellation).
   Safari's SMIL renderer chokes when the poster's 224 constellation animations
   compose with neural-bg's extra 26+ — frame-rate drops to single digits during
   pinch-zoom/pan. The constellation is dense enough on its own; on Safari we
   skip the wallpaper. Other browsers keep it. */
(function loadNeuralBg(){
  const ua = navigator.userAgent;
  const isSafari = /Safari/.test(ua) && !/Chrome|Chromium|Edg|Android/.test(ua);
  if (isSafari) return;
  window.__NEURAL_BG_PARENT = '#poster';
  const s = document.createElement('script');
  s.src = '../neural-bg.js';
  document.body.appendChild(s);
})();

/* ============================ FIT TO VIEWPORT ============================ */
function fit(){
  if (IS_RENDER_MODE) return;
  const stage = document.getElementById('stage');
  const vw = window.innerWidth;
  if (vw < 1300){
    const s = Math.min(1, (vw - 40) / 1240);
    stage.style.setProperty('--fit', s.toFixed(3));
    stage.style.height = (1754 * s) + "px";
  } else {
    stage.style.removeProperty('--fit');
    stage.style.transform = "none";
    stage.style.height = "1754px";
  }
}
window.addEventListener('resize', fit); fit();

/* ============================ DOWNLOAD ============================ */
/*
  이 포스터(1240×1754 최대 5.66x = 7016×9921)는 두 가지 브라우저 제약으로
  인해 클라이언트 사이드 DOM→PNG 렌더링이 불가능하다:

  1. html-to-image / modern-screenshot 는 내부적으로 encodeURIComponent(SVG)
     를 호출하는데, 이 포스터의 foreignObject SVG 길이가 481 MB에 달해 V8
     문자열 상한(~512 MB)을 초과한다.
  2. Blob URL로 우회해도 foreignObject 안에 외부 리소스가 있어 canvas가
     taint되고 toBlob()이 SecurityError를 낸다.

  게다가 file:// 환경에서는 fetch()/XHR로 같은 폴더의 PNG를 읽는 것도
  CORS 정책에 의해 차단되고, `<a href="local.png" download>` 직접 클릭도
  동작하지 않는다 (Chrome은 cross-origin 링크에서 download 속성을 무시).

  해결책: Puppeteer로 사전 렌더링한 PNG를 base64로 인코딩해 별도 JS 파일로
  제공한다. `<script src>`는 file:// 간에도 CORS 없이 로드 가능하며, data:
  URL의 download 속성은 origin과 무관하게 항상 작동한다. 버튼 클릭 시
  필요한 에셋만 동적으로 로드(지연 로딩)하여 초기 페이지 로드는 가볍게
  유지한다.
*/
const DL_ASSETS = {
  preview: { src: 'dl-assets/dl-preview.b64.js', name: 'CMF-Synapse-2026_preview_1240x1754.png', sizeMB: 1.76 },
  dpi300:  { src: 'dl-assets/dl-dpi300.b64.js',  name: 'CMF-Synapse-2026_A3_300dpi.png',         sizeMB: 10.16 },
  dpi600:  { src: 'dl-assets/dl-dpi600.b64.js',  name: 'CMF-Synapse-2026_600dpi_A3.png',         sizeMB: 31.67 }
};

function loadDlAsset(key){
  const cfg = DL_ASSETS[key];
  const globalKey = '__dlAsset_' + key;
  if (window[globalKey]) return Promise.resolve(window[globalKey]);
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.onload = () => {
      if (window[globalKey]) resolve(window[globalKey]);
      else reject(new Error('에셋 파일은 로드되었지만 데이터가 비어있습니다.'));
    };
    s.onerror = () => reject(new Error(
      `"${cfg.src}" 파일을 찾을 수 없습니다.\n\n` +
      "이 포스터는 고해상도 PNG를 사전 렌더링 방식으로 제공합니다.\n" +
      "HTML과 같은 폴더에 'dl-assets/' 서브폴더와 다음 파일들이 필요합니다:\n\n" +
      "  • dl-assets/dl-preview.b64.js   (약 2 MB)\n" +
      "  • dl-assets/dl-dpi300.b64.js    (약 14 MB)\n" +
      "  • dl-assets/dl-dpi600.b64.js    (약 42 MB)"
    ));
    s.src = cfg.src + '?_t=' + Date.now();
    document.head.appendChild(s);
  });
}

async function downloadAsset(key, btn){
  const cfg = DL_ASSETS[key];
  const prevText = btn.textContent;
  btn.disabled = true;
  try {
    btn.textContent = `에셋 로딩… (${cfg.sizeMB.toFixed(1)} MB)`;
    const dataUrl = await loadDlAsset(key);

    btn.textContent = '다운로드 시작…';
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = cfg.name;
    document.body.appendChild(a);
    a.click();
    a.remove();

    btn.textContent = '✓ 저장';
    setTimeout(() => { btn.textContent = prevText; btn.disabled = false; }, 1800);
  } catch (e) {
    console.error('다운로드 에러:', e);
    alert('다운로드 실패:\n\n' + (e.message || e));
    btn.textContent = prevText;
    btn.disabled = false;
  }
}

document.getElementById('dl-prev').addEventListener('click', e => downloadAsset('preview', e.currentTarget));
document.getElementById('dl-300') .addEventListener('click', e => downloadAsset('dpi300',  e.currentTarget));
document.getElementById('dl-600') .addEventListener('click', e => downloadAsset('dpi600',  e.currentTarget));
document.getElementById('dl-print').addEventListener('click', () => window.print());
</script>
